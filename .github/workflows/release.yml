name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: publish-to-npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # OIDC trusted publishing requires npm >= 11.5.1.
      - name: Update npm
        run: npm install --global npm@11.17.0

      - name: Verify tag matches package version
        run: |
          version=$(jq --raw-output .version package.json)
          if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${version}" >&2
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check types
        run: bun run check

      - name: Run tests
        run: bun test

      - name: Build package
        run: bun run build

      - name: Pack package
        run: |
          mkdir artifacts
          bun pm pack --destination artifacts --quiet

      - name: Verify packed package
        run: |
          package=$(printf '%s\n' artifacts/*.tgz)
          manifest=$(tar --extract --gzip --to-stdout --file "${package}" package/package.json)
          packed_version=$(printf '%s' "${manifest}" | jq --raw-output .version)
          if [ "${packed_version}" != "${GITHUB_REF_NAME#v}" ]; then
            echo "Packed version ${packed_version} does not match ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          tar --list --gzip --file "${package}" | grep --quiet '^package/dist/index.js$'
          tar --list --gzip --file "${package}" | grep --quiet '^package/dist/index.d.ts$'

      - name: Publish @moltcms-sdk/client
        run: npm publish ./artifacts/moltcms-sdk-client-*.tgz --provenance --access public
